# Sum-of-the-Parts Valuation — Diversified Conglomerate
# Tests: Segment-level valuation, methodology selection per segment, holdco discount
# SMB integration: Consolidated financials from smb_bridge

id: sotp_conglomerate
title: "Sum-of-the-Parts Valuation — Diversified Industrial Conglomerate"
version: "1.0.0"
module: "10_valuation_synthesis"
category: "sotp"
difficulty: "hard"
estimated_time_minutes: 75
output_format: "excel"

smb_integration:
  enabled: true
  placeholder_prefix: "[X]"
  sheets_required:
    - "IS Annual"
    - "BS Annual"
    - "Valuation"
  fill_fields:
    - "revenue"
    - "ebitda"
    - "net_income"
    - "total_debt"
    - "cash"
    - "shares_outstanding"
    - "share_price"
    - "enterprise_value"

context:
  company:
    name: "[COMPANY]"
    ticker: "[TICKER]"
    sector: "Industrials — Diversified"
    market_cap: "[X]"
    description: >
      Large-cap diversified industrial conglomerate with four
      reportable segments operating in distinct end markets.
      The market may be undervaluing the company due to
      conglomerate discount.

  segments:
    - name: "Aerospace & Defense"
      revenue: "$2,200M"
      ebitda: "$440M"
      ebitda_margin: "20.0%"
      growth: "5%"
      description: "Aftermarket parts and MRO for commercial and military aircraft"
      comparable_multiples: "EV/EBITDA 14-18x for pure-play A&D peers"
      best_methodology: "EV/EBITDA comps"

    - name: "Industrial Automation"
      revenue: "$1,500M"
      ebitda: "$300M"
      ebitda_margin: "20.0%"
      growth: "8%"
      description: "Factory automation, robotics, and motion control"
      comparable_multiples: "EV/EBITDA 16-22x for automation peers (higher growth premium)"
      best_methodology: "EV/EBITDA comps or DCF (high growth)"

    - name: "Building Products"
      revenue: "$900M"
      ebitda: "$135M"
      ebitda_margin: "15.0%"
      growth: "3%"
      description: "HVAC components and building envelope products"
      comparable_multiples: "EV/EBITDA 10-14x for building products peers"
      best_methodology: "EV/EBITDA comps"

    - name: "Specialty Chemicals"
      revenue: "$600M"
      ebitda: "$90M"
      ebitda_margin: "15.0%"
      growth: "2%"
      description: "Specialty coatings and adhesives for industrial applications"
      comparable_multiples: "EV/EBITDA 8-12x for specialty chem peers"
      best_methodology: "EV/EBITDA comps"

  corporate:
    corporate_overhead: "$85M"
    description: "Unallocated corporate G&A, shared services, corporate offices"
    valuation_note: "Corporate costs typically valued at segment average multiple or as a drag"

  situation: >
    An activist investor has taken a 5% stake and is publicly
    arguing that [COMPANY] trades at a significant conglomerate
    discount. They propose spinning off the Aerospace segment
    and selling the Specialty Chemicals division. The board has
    retained an investment bank to conduct an independent SOTP
    analysis to assess the activist's claims.

  as_of_date: "2024-12-15"

task:
  prompt: >
    Build a sum-of-the-parts valuation for [COMPANY]. Your Excel
    deliverable must include:

    1. **Segment Valuations** — For each of the 4 segments:
       - Select comparable pure-play peers (3-5 per segment)
       - Determine appropriate multiple range (low/mid/high)
       - Calculate implied segment enterprise value
    2. **Corporate Cost Treatment** — Value the corporate overhead
       as a deduction (at segment-average multiple)
    3. **SOTP Enterprise Value** — Sum of segment values − corporate
       cost capitalization = total SOTP EV (show low/mid/high)
    4. **Conglomerate Discount** — Compare SOTP implied EV to current
       trading EV. Calculate implied discount as percentage.
    5. **Per-Share Value** — Bridge from SOTP EV → equity value
       per share (subtract net debt, divide by diluted shares)
    6. **Sensitivity** — SOTP value at ±1 turn on each segment's
       multiple to show which segment drives the most valuation
       sensitivity

  expected_output_type: "sotp_valuation"

  constraints:
    - "Each segment must use multiples from relevant pure-play peers"
    - "Corporate costs must be valued separately (not ignored)"
    - "Segment EBITDA should sum to consolidated EBITDA minus corporate"
    - "Acknowledge that SOTP is a theoretical value — realization requires action"
    - "Show the conglomerate discount/premium explicitly"

  time_horizon: "Point-in-time valuation"

data_sources:
  - type: "10-K"
    description: "[COMPANY] Annual Report with segment reporting"
    date: "[X]"
    key_data_points:
      - "Consolidated revenue: [X]"
      - "Consolidated EBITDA: [X]"
      - "Segment revenue and EBITDA per Note disclosures"

  - type: "market_data"
    description: "Current trading data from SMB"
    date: "[X]"
    key_data_points:
      - "Share price: [X]"
      - "Market cap: [X]"
      - "EV: [X]"
      - "Consolidated EV/EBITDA: [X]"

  - type: "peer_data"
    description: "Pure-play peer multiples by segment"
    date: "2024-12-15"
    key_data_points:
      - "A&D pure-plays: 14-18x EV/EBITDA"
      - "Automation pure-plays: 16-22x EV/EBITDA"
      - "Building products: 10-14x EV/EBITDA"
      - "Specialty chemicals: 8-12x EV/EBITDA"

key_facts:
  - fact: "Segment EBITDA ($965M total) minus corporate overhead ($85M) should approximate consolidated EBITDA of ~$880M"
    source: "Segment math"
    importance: "critical"

  - fact: "Aerospace and Automation segments command significantly higher multiples than Building Products and Chemicals"
    source: "Peer analysis"
    importance: "critical"

  - fact: "Conglomerate discounts for diversified industrials typically range from 10-25%"
    source: "Academic research, market data"
    importance: "important"

  - fact: "Corporate overhead must be capitalized as a deduction — ignoring it overstates SOTP value"
    source: "Valuation methodology"
    importance: "important"

pitfalls:
  - description: "Ignoring corporate overhead — adding segment values without deducting capitalized corporate costs"
    failure_type: "omission_error"
    severity: "critical"

  - description: "Using the same multiple for all segments — defeats the purpose of SOTP"
    failure_type: "methodology_error"
    severity: "critical"

  - description: "Segment EBITDA not reconciling to consolidated EBITDA minus corporate"
    failure_type: "reconciliation_error"
    severity: "major"

  - description: "Applying acquisition multiples (with control premium) instead of trading multiples — conflating SOTP with break-up value"
    failure_type: "methodology_error"
    severity: "major"

  - description: "Not showing conglomerate discount calculation — the whole point of the exercise"
    failure_type: "omission_error"
    severity: "major"

evaluation_criteria:
  dimensions:
    - name: "Segment Valuation"
      weight: 0.35
      criteria:
        - "Each segment valued with segment-specific multiples"
        - "Pure-play peers identified per segment (3-5 each)"
        - "Multiple range shown (low/mid/high)"
        - "Implied segment EV calculated correctly"
        - "Higher-growth segments receive higher multiples"

    - name: "Corporate & Reconciliation"
      weight: 0.20
      criteria:
        - "Corporate overhead capitalized as deduction"
        - "Segment EBITDA reconciles to consolidated"
        - "SOTP EV = sum of segments − capitalized corporate"
        - "Reconciliation shown explicitly"

    - name: "Discount Analysis"
      weight: 0.20
      criteria:
        - "SOTP EV compared to current trading EV"
        - "Discount calculated as (SOTP − trading) ÷ SOTP"
        - "Per-share value derived via EV-to-equity bridge"
        - "Context on typical conglomerate discounts"

    - name: "Sensitivity"
      weight: 0.15
      criteria:
        - "Multiple sensitivity per segment (±1 turn)"
        - "Identifies which segment drives most valuation swing"
        - "Low/mid/high cases for total SOTP"

    - name: "Presentation"
      weight: 0.10
      criteria:
        - "Professional formatting"
        - "Clear segment breakdown layout"
        - "Summary table with ranges"

  critical_failures:
    - "Corporate overhead not deducted from SOTP"
    - "Same multiple applied to all segments"
    - "Segment EBITDA does not reconcile to consolidated"
    - "Implied per-share value math is wrong"
    - "Hallucinated segment data or peer multiples"

  pass_threshold: 70

metadata:
  author: "Brad Schonhoft, CFA"
  created_at: "2026-03-24"
  tags:
    - "sotp"
    - "sum_of_parts"
    - "conglomerate"
    - "activist"
    - "industrials"
    - "smb_integration"
