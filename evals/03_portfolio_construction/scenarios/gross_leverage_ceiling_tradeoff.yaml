# Gross Leverage Ceiling Tradeoff: Every Entry Requires an Exit
# Tests: position displacement, marginal contribution analysis, factor tilt impact, market impact of exit

id: gross_leverage_ceiling_tradeoff
title: "Gross Leverage Ceiling Tradeoff: Every Entry Requires an Exit"
version: "1.0.0"
module: "03_portfolio_construction"
category: "position_sizing"
difficulty: "hard"
estimated_time_minutes: 45

# === CONTEXT ===

context:
  portfolio:
    strategy: "Long/Short Equity - Generalist"
    aum: "$1.2B"
    gross_exposure: "192% ($2.304B notional)"
    gross_exposure_limit: "200% ($2.4B notional)"
    net_exposure: "42%"
    available_gross_capacity: "8% ($96M)"
    number_of_positions: "60 long, 35 short"

  new_idea:
    name: "CloudSecurity Platforms"
    ticker: "CSPL"
    sector: "Technology — Cybersecurity"
    market_cap: "$35B"
    thesis: >
      Next-gen SASE/zero-trust platform gaining enterprise share. 45% YoY
      revenue growth, net retention 135%, transitioning to platform sale.
      Trading at 12x forward revenue vs peers at 15-18x for similar growth.
      Catalyst: FedRAMP authorization expected in 60 days opens $8B TAM.
    conviction: "8/10"
    proposed_weight: "3% of NAV ($36M long)"
    trailing_vol: "38%"
    beta: 1.3

  exit_candidates:
    - name: "LegacyEnterprise Software"
      ticker: "LESW"
      weight: "2.8% of NAV ($33.6M long)"
      conviction: "5/10"
      thesis: "Digital transformation beneficiary — but thesis is mature, upside largely captured"
      ytd_return: "+8%"
      trailing_vol: "22%"
      beta: 0.9
      factor_exposures: "Value, quality"
      market_impact_to_exit: "3-5 bps (large cap, liquid)"
      note: "Solid but unexciting; thesis largely played out"

    - name: "ConsumerRetail Recovery"
      ticker: "CRRC"
      weight: "2.2% of NAV ($26.4M long)"
      conviction: "5/10"
      thesis: "Post-pandemic discretionary spending recovery"
      ytd_return: "-3%"
      trailing_vol: "30%"
      beta: 1.1
      factor_exposures: "Momentum (negative), consumer cyclical"
      market_impact_to_exit: "8-12 bps (mid-cap, moderate liquidity)"
      note: "Thesis weakening as consumer sentiment data softens"

    - name: "IndustrialConglomerate Holdings"
      ticker: "ICGH"
      weight: "3.5% of NAV ($42M long)"
      conviction: "6/10"
      thesis: "Sum-of-parts discount; potential activist catalyst"
      ytd_return: "+14%"
      trailing_vol: "20%"
      beta: 0.8
      factor_exposures: "Value, low vol"
      market_impact_to_exit: "2-3 bps (large cap, very liquid)"
      note: "Good thesis but no near-term catalyst for discount closure"

  factor_analysis:
    current_portfolio:
      tech_weight: "24% of gross"
      value_tilt: "+0.15 (mild value)"
      momentum_tilt: "+0.22"
      quality_tilt: "+0.18"
    impact_of_swap:
      add_cspl_exit_lesw: "Tech increases to 25.2%; value tilt drops to +0.10; momentum neutral"
      add_cspl_exit_crrc: "Tech increases to 25.8%; consumer cyclical drops; momentum improves"
      add_cspl_exit_icgh: "Tech increases to 24.7%; value tilt drops to +0.08; low-vol tilt reduced"

# === TASK ===

task:
  prompt: >
    Your fund is at 192% gross exposure against a 200% limit. A new 8/10
    conviction cybersecurity idea requires a 3% position ($36M). You only
    have 8% ($96M) of gross capacity remaining, but adding 3% long means
    the gross increases to 195% — within the limit. However, you'd prefer
    to keep buffer below the ceiling for flexibility.

    To add the new idea at full size while maintaining a buffer, you need to
    exit an existing position. Three candidates are available: a played-out
    enterprise software name (5/10, $33.6M), a weakening consumer retail
    position (5/10, $26.4M), or a value industrial with no near-term
    catalyst (6/10, $42M).

    Evaluate the displacement trade. Your response should address:

    1. Why position entry at leverage limits always has an explicit
       opportunity cost (what must leave the book)
    2. How to rank exit candidates on marginal thesis strength, not past
       performance
    3. The factor tilt changes from each possible swap (tech increases,
       value/quality/momentum shifts)
    4. Market impact of each exit (not all exits are equal in cost)
    5. Whether a partial exit of one name or full exit of another is
       more appropriate
    6. The risk profile change: CSPL at 38% vol replaces a lower-vol name

  expected_output_type: "portfolio_construction_framework"

  constraints:
    - "Must frame entry as requiring an exit at leverage limits"
    - "Must rank exit candidates on forward-looking thesis, not past returns"
    - "Must evaluate factor tilt impact of each swap"
    - "Must consider market impact costs of exits"
    - "Must address the vol/risk profile change from the swap"

# === EVALUATION CRITERIA ===

evaluation_criteria:
  dimensions:
    - name: "Displacement Framework"
      id: "displacement"
      weight: 35
      criteria:
        - "Frames the problem as a displacement trade, not an isolated entry"
        - "Recognizes that at leverage limits, every entry has an explicit exit cost"
        - "Evaluates the new idea vs the weakest existing position, not in isolation"
        - "Considers maintaining gross buffer below the ceiling"

    - name: "Exit Candidate Analysis"
      id: "exit_analysis"
      weight: 35
      criteria:
        - "Ranks on forward-looking marginal thesis, not YTD return"
        - "Identifies CRRC (weakening thesis, negative momentum) as a strong exit candidate"
        - "Notes LESW has a mature thesis with limited remaining upside"
        - "Does not default to exiting the worst performer or the largest position"

    - name: "Portfolio Impact Assessment"
      id: "portfolio_impact"
      weight: 30
      criteria:
        - "Evaluates factor tilt changes from each swap option"
        - "Considers that replacing a 22% vol name with a 38% vol name increases portfolio risk"
        - "Incorporates market impact costs into the displacement decision"
        - "Addresses whether the net portfolio improves or just reshuffles risk"

  critical_failures:
    - "Adds position without considering what to exit"
    - "Exits the position with the worst YTD return without evaluating forward thesis"
    - "Ignores factor tilt changes from the swap"
    - "Does not address the risk profile change (low-vol exit, high-vol entry)"
    - "Treats entry as free when at leverage limits"

  pass_threshold: 70

# === PITFALLS ===

pitfalls:
  - description: "Treating position entry as independent when at leverage limits"
    failure_type: "displacement_blindness"
    severity: "critical"

  - description: "Selecting exit based on worst YTD return (backward-looking)"
    failure_type: "backward_looking_ranking"
    severity: "major"

  - description: "Ignoring that swapping a 22% vol name for a 38% vol name increases portfolio vol"
    failure_type: "risk_profile_blindness"
    severity: "major"

  - description: "Not considering market impact costs across exit candidates"
    failure_type: "implementation_cost_blindness"
    severity: "moderate"

  - description: "Exiting the largest position to maximize gross capacity rather than weakest thesis"
    failure_type: "capacity_over_thesis"
    severity: "moderate"

# === ADVERSARIAL VARIANT ===

adversarial_example:
  response: >
    CSPL is an 8/10 conviction idea and we still have 8% of gross capacity
    remaining. We can add the 3% position without exiting anything — it
    brings us to 195%, still within the 200% limit. No need to sell any
    existing position. If we want to maintain buffer, we can trim later
    when something weakens.

  why_this_fails:
    - "Uses all available buffer without considering need for future flexibility"
    - "Defers the displacement decision ('trim later') — but later is when liquidity is worse"
    - "Does not evaluate existing positions for weakening theses"
    - "Misses the opportunity to improve the portfolio by upgrading a weak position"
    - "Operating at 195% gross leaves only 5% buffer for future opportunities or market stress"

# === ANCHOR ANSWERS ===

anchor_answers:
  strong:
    response: >
      At 192% gross with a 200% limit, this is a displacement trade. While
      technically we have 8% capacity, operating at 195% leaves minimal
      buffer for future opportunities or stress-induced rebalancing. The
      right approach is to exit a position to fund the entry.

      Ranking exit candidates on forward-looking marginal thesis:

      1. CRRC (Consumer Retail, 5/10, -3% YTD): Weakest candidate. The
         post-pandemic recovery thesis is fading as consumer sentiment data
         softens. Negative momentum factor loading. Market impact is higher
         (8-12 bps) due to mid-cap liquidity, but the thesis deterioration
         justifies the cost.

      2. LESW (Legacy Enterprise, 5/10, +8% YTD): Also weak. Thesis is
         mature — upside largely captured. But the position serves as a
         quality/value ballast with low vol (22%). Exiting it cheaply
         (3-5 bps) but increases portfolio risk by removing a low-vol anchor.

      3. ICGH (Industrial, 6/10, +14%): Strongest remaining thesis among
         candidates. Activist catalyst is uncertain but the sum-of-parts
         discount provides downside support. Lowest market impact (2-3 bps).
         Keep.

      Recommended swap: Exit CRRC fully ($26.4M) and trim LESW by $10M
      (from $33.6M to $23.6M). This frees $36.4M — enough for the CSPL
      entry with minimal excess. Net gross stays at ~192%.

      Factor impact: tech increases modestly (24% to ~25.5%), consumer
      cyclical exposure decreases (desirable given softening data),
      momentum tilt improves (removing negative-momentum CRRC). The main
      cost is replacing 22-30% vol names with a 38% vol position — portfolio
      vol will increase. Acceptable given the thesis quality differential.

  failing:
    response: >
      We have capacity under the gross limit, so we can add CSPL without
      selling anything. We'll trim something later if needed.

# === KEY FACTS ===

key_facts:
  - fact: "Gross at 192% vs 200% limit — 8% remaining capacity"
    source: "context.portfolio"
    importance: "critical"

  - fact: "CRRC thesis weakening (consumer sentiment softening), 5/10 conviction, negative momentum"
    source: "context.exit_candidates"
    importance: "important"

  - fact: "LESW thesis mature (upside captured), 5/10 conviction, but low-vol stabilizer"
    source: "context.exit_candidates"
    importance: "important"

  - fact: "Swapping 22% vol name for 38% vol name increases portfolio-level volatility"
    source: "derived"
    importance: "important"

  - fact: "Market impact varies 3x across exit candidates (2-3 bps to 8-12 bps)"
    source: "context.exit_candidates"
    importance: "moderate"

# === METADATA ===

metadata:
  author: "Brad Schonhoft, CFA"
  created_at: "2026-02-28"
  sector_focus: "multi-sector"
  skill_level: "advanced"
  tags:
    - "portfolio_construction"
    - "position_sizing"
    - "gross_leverage"
    - "displacement_trade"
    - "factor_tilts"
    - "marginal_thesis"
  notes: >
    This scenario tests whether the model understands that at leverage limits,
    every entry requires an exit. The key insight is that the new idea's
    absolute quality is less important than its quality relative to the weakest
    existing position. Portfolio construction at the margin is always about
    displacement, not addition.
