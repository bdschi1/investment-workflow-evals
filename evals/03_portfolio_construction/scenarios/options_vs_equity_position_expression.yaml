# Options vs Equity Position Expression: Same Thesis, Different Portfolio Impact
# Tests: instrument selection as sizing decision, non-linear risk profiles, time decay, portfolio-level contribution

id: options_vs_equity_position_expression
title: "Options vs Equity Position Expression: Same Thesis, Different Portfolio Impact"
version: "1.0.0"
module: "03_portfolio_construction"
category: "position_sizing"
difficulty: "hard"
estimated_time_minutes: 45

# === CONTEXT ===

context:
  portfolio:
    strategy: "Long/Short Equity - Healthcare"
    aum: "$500M"
    gross_exposure: "170%"
    net_exposure: "40%"
    current_portfolio_delta: "$200M net long (40% * $500M)"
    portfolio_beta: 0.85

  bullish_thesis:
    name: "PrecisionMedicine Corp"
    ticker: "PMDC"
    sector: "Biotechnology — Precision Oncology"
    market_cap: "$30B"
    current_price: "$95.00"
    thesis: >
      Precision oncology company with lead drug showing 45% response rate
      in Phase 3 vs 15% standard of care. Full data readout in 5 months.
      If positive, NDA filing follows with potential $4B peak sales.
      Market is pricing ~40% probability of approval. Our estimate: 60%.
    time_horizon: "5 months to data readout, 12 months to NDA decision"
    conviction: "8/10"

  expression_options:
    equity:
      position: "$40M in stock (5.3% of NAV)"
      delta_contribution: "$40M"
      max_loss: "Theoretically unlimited downside (practically -50% = $20M)"
      portfolio_impact:
        delta_addition: "$40M (increases net delta to $240M)"
        beta_contribution: "Adds 0.08 to portfolio beta (0.85 → 0.93)"
        risk_profile: "Linear — gains/losses proportional to stock move"
        vol_contribution: "1.6% to portfolio vol (5.3% weight * 30% trailing vol)"
      holding_costs: "None (equity has no time decay)"
      thesis_risk: >
        If data readout is delayed from 5 months to 10 months (common in
        biotech), the equity position is unaffected. Patient capital.

    options:
      position: "$6M in 4-month ATM calls ($95 strike, 30% IV)"
      notional_exposure: "$40M equivalent at 90 delta"
      delta_contribution: "$36M at entry (90 delta * $40M notional)"
      max_loss: "$6M (1.2% of NAV) — the premium paid"
      greeks_at_entry:
        delta: 0.90
        gamma: 0.025
        theta: "-$18K per day"
        vega: "$180K per vol point"
      portfolio_impact:
        delta_addition: "$36M at entry (decreases daily as theta erodes)"
        beta_contribution: "Initially similar to equity, but non-constant"
        risk_profile: >
          Non-linear. At entry, behaves like 90% of the stock. As time passes
          or stock drops, delta decreases and the position shrinks. If stock
          rallies, delta increases toward 1.0 (behaves more like stock).
        vol_contribution: "Complex — includes delta, gamma, and vega components"
      holding_costs:
        theta_daily: "$18,000 per day"
        theta_4_months: "$2.16M total time decay if stock is unchanged"
        note: "The options 'bleed' $18K/day regardless of stock movement"
      thesis_risk: >
        If data readout is delayed from 5 months to 10 months, the 4-month
        calls expire worthless. $6M lost with no thesis impairment. Must
        roll to new expiry ($3-5M additional cost) or accept the loss.

  comparative_analysis:
    scenario_1_stock_up_25pct:
      equity_pnl: "+$10M"
      options_pnl: "+$7.4M (after theta and gamma effects)"
    scenario_2_stock_flat:
      equity_pnl: "$0"
      options_pnl: "-$2.16M (theta drag over 4 months)"
    scenario_3_stock_down_30pct:
      equity_pnl: "-$12M"
      options_pnl: "-$6M (max loss is premium)"
    scenario_4_data_delay_6_months:
      equity_pnl: "Position intact, -$0 (no carrying cost)"
      options_pnl: "-$6M (calls expire worthless) + $3-5M to roll"

  margin_and_capital:
    equity_buying_power: "$40M (or ~$20M if on margin)"
    options_buying_power: "$6M (premium only, no margin)"
    capital_efficiency: "Options use 6.7x less capital for similar initial exposure"
    note: >
      The capital efficiency of options is offset by theta drag, non-linear
      delta, and time-bounded exposure.

# === TASK ===

task:
  prompt: >
    A bullish thesis on a precision oncology company can be expressed as
    either (A) $40M in stock (5.3% of NAV) or (B) $6M in 4-month ATM
    calls providing similar initial delta exposure ($36M). Both express
    the same thesis. The data readout is in 5 months.

    However, these two expressions have dramatically different portfolio
    impacts. The stock has linear risk, no time decay, and survives
    delays. The options have non-linear risk, $18K/day in theta drag,
    and expire worthless if the catalyst is delayed.

    How should you choose between these expressions? Your response should
    address:

    1. The key tradeoffs: max loss, time decay, delta stability,
       capital efficiency, and time-bounded exposure
    2. How options change the portfolio's risk profile differently than
       equity (non-linear delta, gamma, vega exposure)
    3. The thesis timeline problem: options expire in 4 months, data
       readout in 5 months — the options may not survive to the catalyst
    4. When the defined-loss feature of options is worth the theta cost
    5. How each expression changes portfolio-level beta and delta
    6. Whether a hybrid (partial equity + partial options) is more
       appropriate than either alone

  expected_output_type: "portfolio_construction_framework"

  constraints:
    - "Must analyze both expressions' portfolio-level impact"
    - "Must address the timeline mismatch (4-month options vs 5-month catalyst)"
    - "Must evaluate time decay cost ($2.16M over 4 months)"
    - "Must consider non-linear risk profile of options"
    - "Must not default to either expression without analysis"

# === EVALUATION CRITERIA ===

evaluation_criteria:
  dimensions:
    - name: "Instrument Comparison"
      id: "instrument_comparison"
      weight: 40
      criteria:
        - "Correctly identifies all key tradeoffs (max loss, theta, delta stability, capital efficiency)"
        - "Recognizes the timeline mismatch (options expire before catalyst)"
        - "Quantifies the theta drag ($2.16M over 4 months, 36% of premium)"
        - "Notes that options provide defined risk but at a significant carrying cost"

    - name: "Portfolio-Level Risk Analysis"
      id: "portfolio_risk"
      weight: 30
      criteria:
        - "Analyzes how each expression changes portfolio delta and beta differently"
        - "Recognizes that options' non-linear delta changes the portfolio's risk profile daily"
        - "Notes that gamma exposure creates path-dependent portfolio behavior"
        - "Evaluates vega exposure — options add vol sensitivity that equity doesn't"

    - name: "Recommendation Quality"
      id: "recommendation"
      weight: 30
      criteria:
        - "Addresses the timeline mismatch explicitly (4-month options vs 5-month catalyst)"
        - "Considers longer-dated options (6-month) to capture the catalyst"
        - "Evaluates a hybrid approach (partial equity + partial options)"
        - "Provides a specific recommendation with clear rationale"

  critical_failures:
    - "Chooses options purely for capital efficiency without addressing theta cost"
    - "Chooses equity without considering the defined-loss advantage of options"
    - "Ignores the timeline mismatch (options expire before catalyst)"
    - "Does not analyze portfolio-level impact of each expression"
    - "Treats the two expressions as equivalent because they have similar initial delta"

  pass_threshold: 70

# === PITFALLS ===

pitfalls:
  - description: "Choosing options for capital efficiency while ignoring $2.16M theta drag"
    failure_type: "capital_efficiency_trap"
    severity: "major"

  - description: "Buying 4-month options for a 5-month catalyst (timeline mismatch)"
    failure_type: "expiry_mismatch"
    severity: "critical"

  - description: "Treating options and equity as equivalent because initial deltas are similar"
    failure_type: "static_delta_error"
    severity: "major"

  - description: "Ignoring that gamma changes the position's risk profile daily"
    failure_type: "greeks_blindness"
    severity: "moderate"

  - description: "Not considering that biotech data readouts frequently delay"
    failure_type: "catalyst_timing_naivety"
    severity: "major"

# === ADVERSARIAL VARIANT ===

adversarial_example:
  response: >
    Options are clearly the better choice. For $6M in premium, we get $40M
    of exposure with defined max loss. That's 6.7x capital efficiency. The
    90 delta at entry means the position behaves almost identically to stock.
    If we're wrong, we lose $6M instead of potentially $20M. The risk/reward
    is strictly better with options. We should deploy the full $6M in
    4-month ATM calls.

  why_this_fails:
    - "Ignores $18K/day theta drag ($2.16M over 4 months — 36% of premium)"
    - "The 4-month calls expire BEFORE the 5-month data readout"
    - "90 delta is only at entry — it decreases as theta erodes and if stock drops"
    - "In the stock-flat scenario, equity loses nothing while options lose $2.16M"
    - "Capital efficiency is offset by the carrying cost"
    - "Options do NOT behave 'almost identically to stock' — they have non-linear, time-decaying delta"

# === ANCHOR ANSWERS ===

anchor_answers:
  strong:
    response: >
      This is not a simple choice — each expression has distinct portfolio
      implications that must be evaluated in context.

      Timeline problem: the 4-month ATM calls expire before the 5-month
      data readout. This is the most important issue. If we buy 4-month
      options, we're paying $6M for exposure that doesn't survive to the
      catalyst. We would need to roll (additional $3-5M) or accept the
      loss. If options are the preferred instrument, they need to be
      6-month expiry to capture the readout — which will cost more premium.

      Theta cost: at $18K/day, the 4-month options burn $2.16M if the
      stock is unchanged. That's 36% of the premium. In the stock-flat
      scenario, equity loses $0 while options lose $2.16M. Theta is the
      price of defined risk.

      Portfolio impact: equity adds $40M of constant, linear delta and
      0.08 to portfolio beta. It's simple and predictable. Options add
      $36M of initial delta that changes daily — the position shrinks when
      the stock drops (gamma reduces delta) and grows when it rallies.
      This creates a path-dependent portfolio that's harder to risk-manage.
      The vega component also adds vol sensitivity: if implied vol drops
      5 points, the options lose $900K from vega alone.

      Recommendation: hybrid approach. Deploy $25M in equity (3.3% of NAV)
      as the core position — this survives delays, has no theta, and
      contributes stable delta. Complement with $3M in 6-month OTM call
      options ($105 strike) for leveraged upside exposure to the catalyst.
      The calls provide asymmetric upside for a defined cost, while the
      equity base provides stable, delay-tolerant exposure.

      Total risk: $25M equity downside is portfolio-level risk. $3M
      options is defined loss. The hybrid balances capital efficiency with
      thesis-timeline resilience.

  failing:
    response: >
      Options are the clear winner — $6M in premium for $40M of exposure
      with defined risk. We should buy the 4-month ATM calls.

# === KEY FACTS ===

key_facts:
  - fact: "4-month options expire BEFORE the 5-month data readout (timeline mismatch)"
    source: "context.expression_options.options"
    importance: "critical"

  - fact: "Theta drag: $18K/day, $2.16M over 4 months (36% of premium)"
    source: "context.expression_options.options.greeks_at_entry"
    importance: "critical"

  - fact: "In stock-flat scenario: equity $0, options -$2.16M"
    source: "context.comparative_analysis"
    importance: "important"

  - fact: "Delta is 0.90 at entry but decreases daily — options don't behave like stock over time"
    source: "context.expression_options.options.greeks_at_entry"
    importance: "important"

  - fact: "Biotech data readouts frequently delay — equity survives delays, options don't"
    source: "context.expression_options.options.thesis_risk"
    importance: "important"

# === METADATA ===

metadata:
  author: "Brad Schonhoft, CFA"
  created_at: "2026-02-28"
  sector_focus: "healthcare"
  skill_level: "advanced"
  tags:
    - "portfolio_construction"
    - "position_sizing"
    - "options"
    - "instrument_selection"
    - "greeks"
    - "time_decay"
    - "non_linear_risk"
  notes: >
    This scenario tests whether the model understands that instrument selection
    IS a sizing decision. Same thesis, same conviction — but the portfolio
    impact of equity vs options is dramatically different. The key insight is
    that options are not "cheap stock" — they have carrying costs (theta),
    non-linear behavior (gamma), and time-bounded exposure that fundamentally
    change the risk profile. The timeline mismatch (4-month options vs
    5-month catalyst) is the immediate practical issue.
